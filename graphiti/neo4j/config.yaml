
server:
  transport: "${TRANSPORT:-http}"

llm:
  provider: "${LLM_PROVIDER:-openai}"
  model: "${LLM_MODEL:-qwen/qwen3-coder-next}"
  api_key: "${LLM_API_KEY:-llama}"
  api_base: "${LLM_BASE_URL:-http://10.0.0.18:1234/v1}"

embedder:
  provider: "${EMBEDDER_PROVIDER:-openai}"
  model: "${EMBEDDER_MODEL:-text-embeddingnomic-embed-text-v2-moe}"
  api_key: "${EMBEDDER_API_KEY:-llama}"
  api_base: "${EMBEDDER_BASE_URL:-http://10.0.0.18:1234/v1}"

database:
  provider: "neo4j"
  providers:
    neo4j:
      uri: "${NEO4J_URI:-bolt://neo4j:7687}"
      username: "${NEO4J_USER:-neo4j}"
      password: "${NEO4J_PASSWORD:-password}"
      database: "${NEO4J_DATABASE:-neo4j}"
