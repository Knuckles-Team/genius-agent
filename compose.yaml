services:
  genius-agent:
    build:
      context: .
      dockerfile: debug.Dockerfile
    container_name: genius-agent
    hostname: genius-agent
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    environment:
      - "HOST=0.0.0.0"
      - "PORT=9033"
      - "PROVIDER=openai"
      - "LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}"
      - "LLM_API_KEY=${LLM_API_KEY:-llama}"
      - "MODEL_ID=${MODEL_ID:-qwen/qwen3-coder-next}"
      - "DEBUG=True"
      - "ENABLE_WEB_UI=True"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9033:9033"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9033/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
