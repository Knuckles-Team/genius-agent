  graphiti-mcp:
    image: zepai/knowledge-graph-mcp:standalone
    container_name: graphiti-mcp
    hostname: graphiti-mcp
    # depends_on:
    #   neo4j:
    #     condition: service_healthy
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      - GRAPHITI_GROUP_ID=main
      - SEMAPHORE_LIMIT=3
      - CONFIG_PATH=/app/mcp/config/config.yaml
      - HOST=0.0.0.0
      - PORT=8034
      - DATABASE_PROVIDER=kuzu
      - LLM_PROVIDER=openai
      - LLM_API_KEY=llama
      - LLM_MODEL=${MODEL_ID:-qwen/qwen3-coder-next}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}
      - EMBEDDER_PROVIDER=openai
      - EMBEDDER_API_KEY=llama
      - EMBEDDER_MODEL=nomic-embed-text
      - EMBEDDER_BASE_URL=http://host.docker.internal:1234/v1
      - LLM_API_KEY=llama
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}
      - GRAPHITI_TELEMETRY_ENABLED=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./mcp/graphiti_config/config.yaml:/app/mcp/config/config.yaml:ro
    ports:
      - "8034:8034"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8034/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  vector-mcp-chromadb:
    image: docker.io/knucklessg1/vector-mcp:latest
    # build: . # Debug
    container_name: vector-mcp-chromadb
    hostname: vector-mcp-chromadb
    command: [ "vector-mcp" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    environment:
      - "HOST=0.0.0.0"
      - "PORT=8002"
      - "TRANSPORT=streamable-http"
      - "DATABASE_TYPE=${DATABASE_TYPE:-chromadb}"
      - "DATABASE_PATH=${DATABASE_PATH:-/data/chromadb}"
      - "DOCUMENT_DIRECTORY=${DOCUMENT_DIRECTORY:-/documents}"
    ports:
      - "8002:8002"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./mcp/vector_data:/data
      - ./mcp/documents:/documents

