    - WORKSPACE_TOOLS=${WORKSPACE_TOOLS}
    extra_hosts:
    - host.docker.internal:host-gateway
    ports:
    - 9033:9033
    healthcheck:
      test:
      - CMD
      - python3
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:9033/health')
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
