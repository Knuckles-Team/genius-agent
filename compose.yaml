services:

  genius-mcp:
    build:
      context: .
      dockerfile: debug.Dockerfile
    container_name: genius-mcp
    hostname: genius-mcp
    command: [ "genius-mcp" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      # - neo4j
      - graphiti-mcp
      - vector-mcp-pgvector
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    environment:
      - "HOST=0.0.0.0"
      - "PORT=8033"
      - "TRANSPORT=streamable-http"
      - "PROVIDER=${PROVIDER:-openai}"
      - "LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}"
      - "LLM_API_KEY=${LLM_API_KEY:-ollama}"
      - "MODEL_ID=${MODEL_ID:-qwen/qwen3-coder-next}"
      - "EMBEDDING_PROVIDER=${MODEL_ID:-openai}"
      - "EMBEDDING_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}"
      - "EMBEDDING_API_KEY=${LLM_API_KEY:-ollama}"
      - "EMBEDDER_MODEL=nomic-embed-text"
      - "EMBEDDING_DIM=${EMBEDDING_DIM:-768}"
      - "SEMAPHORE_LIMIT=3"
      - "VECTOR_MCP_URL=${VECTOR_MCP_URL:-http://vector-mcp-pgvector:8002/mcp}"
      # - "GRAPHDB_URI=${GRAPHDB_URI:-bolt://neo4j:7687}"
      - "GRAPHDB_URI=${GRAPHDB_URI:-/app/data/kuzu}"
      - "GRAPHDB_USERNAME=${GRAPHDB_USERNAME:-neo4j}"
      - "GRAPHDB_PASSWORD=${GRAPHDB_PASSWORD:-password}"
      - "GRAPHDB_NAME=kuzu"
      - "GRAPHDB_TYPE=kuzu"
    ports:
      - "8033:8033"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8033/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./mcp/documents:/documents

  genius-agent:
    build:
      context: .
      dockerfile: debug.Dockerfile
    container_name: genius-agent
    hostname: genius-agent
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    environment:
      - "HOST=0.0.0.0"
      - "PORT=9033"
      - "PROVIDER=openai"
      - "LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}"
      - "LLM_API_KEY=llama"
      - "MODEL_ID=${MODEL_ID:-qwen/qwen3-coder-next}"
      - "DEBUG=True"
      - "ENABLE_WEB_UI=True"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - genius-mcp
      - postgres
      # - neo4j
      - graphiti-mcp
      - vector-mcp-pgvector
      - searxng-mcp
      - searxng
      - crawl4ai
    ports:
      - "9033:9033"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9033/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./mcp/documents:/documents

