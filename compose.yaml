  crawl4ai:
    image: docker.io/unclecode/crawl4ai:latest
    container_name: crawl4ai
    hostname: crawl4ai
    environment:
      - PORT=11235
      - HOST=0.0.0.0
    ports:
      - "11235:11235"

  searxng-mcp:
    image: docker.io/knucklessg1/searxng-mcp:latest
    container_name: searxng-mcp
    hostname: searxng-mcp
    command: [ "searxng-mcp" ]
    depends_on:
      - searxng
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    environment:
      - "HOST=0.0.0.0"
      - "PORT=8001"
      - "TRANSPORT=streamable-http"
      - "SEARXNG_INSTANCE_URL=http://searxng:8080"
    ports:
      - "8001:8001"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    hostname: searxng
    environment:
      - SEARXNG_INSTANCE_NAME=Private SearXNG
      - SEARXNG_BIND_ADDRESS=0.0.0.0:8080
      - SEARXNG_PORT=8080
      - SEARXNG_LIMITER=false
      - SEARXNG_PUBLIC_INSTANCE=false
      - SEARXNG_IMAGE_PROXY=false
      - SEARXNG_METHOD=POST
      - SEARXNG_DEFAULT_THEME=simple
      - SEARXNG_DEFAULT_LOCALE=en
      - SEARXNG_SAFE_SEARCH=0
      - SEARXNG_FORMATS=html,json
    volumes:
      - "./mcp/searxng_config:/etc/searxng:rw"
      - "./mcp/searxng_data:/var/cache/searxng:rw"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    ports:
      - "8088:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
